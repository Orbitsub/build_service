{% extends "base.html" %}

{% block title %}Infinite Solutions — Build Service{% endblock %}

{% block content %}

    <!-- Main tabs -->
    <div class="main-tabs">
        <button class="main-tab active" onclick="showTab('customer')">Request a Build</button>
        <button class="main-tab" onclick="showTab('status')">Check Request Status</button>
        <!--
        <button class="main-tab" onclick="showTab('builder')">Builder Job Board</button>
        -->
    </div>

    {% include "tab_customer.html" %}
    {% include "tab_status.html" %}
    {% include "tab_builder.html" %}

{% endblock %}

{% block scripts %}
<script>
    function showTab(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
{% endblock %}
